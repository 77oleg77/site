<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Канал — Исцеление слой за слоем</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .inner-page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      overflow: hidden;
    }
    .inner-page .hero-bg { position: absolute; inset: 0; z-index: 0; }
    .inner-page .hero-bg img { width: 100%; height: 100%; object-fit: cover; }
    .inner-page .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 20, 50, 0.45);
    }
    .inner-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      max-width: 700px;
    }
    .inner-content h1 {
      font-size: clamp(26px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    .inner-content p {
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.7;
      margin-bottom: 36px;
      opacity: 0.9;
    }
    .back-btn {
      display: inline-block;
      background: linear-gradient(135deg, #d4a94e, #c8921a);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 12px;
      letter-spacing: 0.05em;
      transition: background 0.25s;
    }
    .back-btn:hover { background: linear-gradient(135deg, #e0ba6a, #d4a94e); }
  </style>
</head>
<body>
  <div class="inner-page">
    <div class="hero-bg">
      <img src="img/fon.png" alt="фон" />
    </div>
    <div class="inner-content">
      <h1>КАНАЛ<br />ИСЦЕЛЕНИЕ СЛОЙ ЗА СЛОЕМ</h1>
      <p>
        Здесь будет описание Telegram-канала. Закрытый канал с еженедельными практиками.
        Добавьте сюда ссылку на канал, описание формата и условия подписки.
      </p>
      <a href="index.html" class="back-btn">← Назад</a>
    </div>
  </div>
</body>
</html>
